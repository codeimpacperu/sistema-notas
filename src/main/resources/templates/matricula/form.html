<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Nueva Matrícula</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Registrar Matrícula</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/matriculas/guardar}"
                  method="post">

                <div class="mb-3">

                    <label class="form-label">

                        Alumno

                    </label>

                    <select name="alumnoId"
                            class="form-select">

                        <option
                                th:each="a : ${alumnos}"
                                th:value="${a.id}"
                                th:text="${a.nombres + ' ' + a.apellidos}">
                        </option>

                    </select>

                </div>

                <button type="submit"
                        class="btn btn-success">

                    Guardar Matrícula

                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
