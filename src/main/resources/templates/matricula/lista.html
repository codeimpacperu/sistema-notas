<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" th:href="@{/img/favicon-96x96.png}">
    <link rel="apple-touch-icon" th:href="@{/img/apple-touch-icon.png}">

    <title>Lista de Matrículas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Lista de Matrículas</h3>

        </div>

        <div class="card-body">

            <div class="mb-3">

                <a th:href="@{/matriculas/nuevo}"
                   class="btn btn-success">

                    Nueva Matrícula

                </a>

                <a th:href="@{/reportes/matriculas}"
                   target="_blank"
                   class="btn btn-danger">

                    Exportar PDF

                </a>
                 <!-- Volver al inicio -->
                <a th:href="@{/}" class="btn btn-secondary">← Volver</a>

            </div>

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Alumno</th>
                    <th>Estado</th>
                    <th>Cursos Matriculados</th>
                    <th>Total Cursos</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="m : ${matriculas}">

                    <td th:text="${m.id}"></td>

                    <td th:text="${m.fecha}"></td>

                    <td th:text="${m.alumno.nombres + ' ' + m.alumno.apellidos}"></td>

                    <td th:text="${m.estado}"></td>

                    <td>

                        <span th:each="d, stat : ${m.detalles}">

                            <span th:text="${d.curso.nombre}"></span>

                            <span th:if="${!stat.last}">
                                ,
                            </span>

                        </span>

                    </td>

                    <td th:text="${#lists.size(m.detalles)}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
