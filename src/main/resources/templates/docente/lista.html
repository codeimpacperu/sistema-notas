<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" th:href="@{/img/favicon-96x96.png}">
    <link rel="apple-touch-icon" th:href="@{/img/apple-touch-icon.png}">

    <title>Lista Docentes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">
    <div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-dark text-white">

            <h3>Lista de Docentes</h3>

        </div>

        <div class="card-body">

            <!-- BOTÓN NUEVO -->
            <a th:href="@{/docentes/nuevo}"
               class="btn btn-success mb-3">

                Nuevo Docente

            </a>
            <!-- BOTÓN VOLVER -->
                <a th:href="@{/}" class="btn btn-secondary mb-3">← Volver</a>

            <!-- FORMULARIO DE BÚSQUEDA -->
            <form th:action="@{/docentes/buscar}"
                  method="get"
                  class="row g-3 mb-3">

                <div class="col-md-4">

                    <input type="text"
                           name="especialidad"
                           class="form-control"
                           placeholder="Buscar especialidad">

                </div>

                <div class="col-md-2">

                    <button type="submit"
                            class="btn btn-primary">

                        Buscar

                    </button>

                </div>

                <div class="col-md-2">

                    <a th:href="@{/docentes}"
                       class="btn btn-secondary">

                        Mostrar Todos

                    </a>

                </div>

            </form>

            <!-- TABLA -->
            <table class="table table-bordered table-hover">

                <thead class="table-primary">

                <tr>

                    <th>ID</th>
                    <th>Nombres</th>
                    <th>Apellidos</th>
                    <th>Código</th>
                    <th>Correo</th>
                    <th>Teléfono</th>
                    <th>Especialidad</th>
                    <th>Acciones</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="d : ${docentes}">

                    <td th:text="${d.id}"></td>

                    <td th:text="${d.nombres}"></td>

                    <td th:text="${d.apellidos}"></td>

                    <td th:text="${d.codigo}"></td>

                    <td th:text="${d.correo}"></td>

                    <td th:text="${d.telefono}"></td>

                    <td th:text="${d.especialidad}"></td>

                    <td>

                        <a th:href="@{/docentes/editar/{id}(id=${d.id})}"
                           class="btn btn-warning btn-sm">

                            Editar

                        </a>

                        <a th:href="@{/docentes/eliminar/{id}(id=${d.id})}"
                           class="btn btn-danger btn-sm">

                            Eliminar

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
