<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title>Lista de Alumnos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Lista de Alumnos</h3>

        </div>

        <div class="card-body">

        <div class="mb-3">

            <a th:href="@{/alumnos/nuevo}"
            class="btn btn-success">
                Nuevo Alumno
            </a>

            <a th:href="@{/reportes/alumnos}"
            target="_blank"
            class="btn btn-primary">
                📄 Reporte General
            </a>

        </div>

    <table class="table table-bordered table-hover">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Nombres</th>
                    <th>Apellidos</th>
                    <th>Código</th>
                    <th>DNI</th>
                    <th>Acciones</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="a : ${alumnos}">

                    <td th:text="${a.id}"></td>

                    <td th:text="${a.nombres}"></td>

                    <td th:text="${a.apellidos}"></td>

                    <td th:text="${a.codigo}"></td>

                    <td th:text="${a.dni}"></td>

                    <td>

                        <a th:href="@{/alumnos/editar/{id}(id=${a.id})}"
                           class="btn btn-warning btn-sm">
                            Editar
                        </a>

                        <a th:href="@{/alumnos/eliminar/{id}(id=${a.id})}"
                           class="btn btn-danger btn-sm">
                            Eliminar
                        </a>

                        <a th:href="@{/reportes/alumnos/{codigo}(codigo=${a.codigo})}"
                           target="_blank"
                           class="btn btn-primary btn-sm">
                            PDF
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
