<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Formulario Alumno</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>Formulario Alumno</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/alumnos/guardar}"
                  th:object="${alumno}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">

                    <label>Nombres</label>

                    <input type="text"
                           th:field="*{nombres}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Apellidos</label>

                    <input type="text"
                           th:field="*{apellidos}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Código</label>

                    <input type="text"
                           th:field="*{codigo}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>DNI</label>

                    <input type="text"
                           th:field="*{dni}"
                           class="form-control">

                </div>

                <button type="submit"
                        class="btn btn-primary">

                    Guardar

                </button>

                <a th:href="@{/alumnos}"
                   class="btn btn-secondary">

                    Volver

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
