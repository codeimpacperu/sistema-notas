<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" th:href="@{/img/favicon-96x96.png}">
    <link rel="apple-touch-icon" th:href="@{/img/apple-touch-icon.png}">
    <title>Formulario Nota</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3 th:if="${nota.id == null}">
                Registro de Nota
            </h3>

            <h3 th:if="${nota.id != null}">
                Editar Nota
            </h3>

        </div>

        <div class="card-body">

            <!-- 🔥 ERROR -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <strong>Error:</strong>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/notas/guardar}" method="post" class="p-3">

                <!-- 🔥 IMPORTANTE: ID OCULTO (EVITA BUG DE "NUEVO REGISTRO") -->
                <input type="hidden" name="id" th:value="${nota.id}">

                <div class="row g-3">

                    <!-- ALUMNO -->
                    <div class="col-md-6">
                        <label class="form-label">Alumno</label>

                        <select name="alumnoId"
                                class="form-select"
                                th:disabled="${nota.id != null}"
                                required>

                            <option value="">Seleccione alumno</option>

                            <option th:each="a : ${alumnos}"
                                    th:value="${a.id}"
                                    th:selected="${nota.alumno != null and a.id == nota.alumno.id}"
                                    th:text="${a.nombres + ' ' + a.apellidos}">
                            </option>

                        </select>

                        <input type="hidden"
                               name="alumnoId"
                               th:if="${nota.id != null}"
                               th:value="${nota.alumno.id}">
                    </div>

                    <!-- CURSO -->
                    <div class="col-md-6">
                        <label class="form-label">Curso</label>

                        <select name="cursoId"
                                class="form-select"
                                th:disabled="${nota.id != null}"
                                required>

                            <option value="">Seleccione curso</option>

                            <option th:each="c : ${cursos}"
                                    th:value="${c.id}"
                                    th:selected="${nota.curso != null and c.id == nota.curso.id}"
                                    th:text="${c.nombre}">
                            </option>

                        </select>

                        <input type="hidden"
                               name="cursoId"
                               th:if="${nota.id != null}"
                               th:value="${nota.curso.id}">
                    </div>

                    <!-- DOCENTE -->
                    <div class="col-md-6">
                        <label class="form-label">Docente</label>

                        <select name="docenteId"
                                class="form-select"
                                th:disabled="${nota.id != null}"
                                required>

                            <option value="">Seleccione docente</option>

                            <option th:each="d : ${docentes}"
                                    th:value="${d.id}"
                                    th:selected="${nota.docente != null and d.id == nota.docente.id}"
                                    th:text="${d.nombres + ' ' + d.apellidos}">
                            </option>

                        </select>

                        <input type="hidden"
                               name="docenteId"
                               th:if="${nota.id != null}"
                               th:value="${nota.docente.id}">
                    </div>

                    <!-- TIPO EVALUACIÓN -->
                    <div class="col-md-6">
                        <label class="form-label">Tipo de Evaluación</label>

                        <select name="tipoEvaluacion"
                                class="form-select"
                                th:disabled="${nota.id != null}"
                                required>

                            <option value="">Seleccione evaluación</option>

                            <option value="PRACTICA_1"
                                    th:selected="${nota.tipoEvaluacion == 'PRACTICA_1'}">
                                PRÁCTICA 1
                            </option>

                            <option value="PRACTICA_2"
                                    th:selected="${nota.tipoEvaluacion == 'PRACTICA_2'}">
                                PRÁCTICA 2
                            </option>

                            <option value="EXAMEN"
                                    th:selected="${nota.tipoEvaluacion == 'EXAMEN'}">
                                EXAMEN
                            </option>

                            <option value="TRABAJO"
                                    th:selected="${nota.tipoEvaluacion == 'TRABAJO'}">
                                TRABAJO
                            </option>

                        </select>

                        <input type="hidden"
                               name="tipoEvaluacion"
                               th:if="${nota.id != null}"
                               th:value="${nota.tipoEvaluacion}">
                    </div>

                    <!-- NOTA -->
                    <div class="col-md-6">
                        <label class="form-label">Nota</label>

                        <input type="number"
                               name="notaValor"
                               class="form-control"
                               min="0"
                               max="20"
                               step="0.1"
                               th:value="${nota.nota}"
                               required>
                    </div>

                    <!-- BOTONES -->
                    <div class="col-12 mt-3">

                        <button type="submit" class="btn btn-primary">
                            Guardar Nota
                        </button>

                        <a href="/notas" class="btn btn-secondary">
                            Volver
                        </a>

                    </div>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
