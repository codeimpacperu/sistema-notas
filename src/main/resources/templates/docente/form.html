<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{/img/favicon-96x96.png}">
    <link rel="apple-touch-icon" th:href="@{/img/apple-touch-icon.png}">

    <title>Formulario Docente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">
    <div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>Formulario Docente</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/docentes/guardar}"
                  th:object="${docente}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">

                    <label>Nombres</label>

                    <input type="text"
                           th:field="*{nombres}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Apellidos</label>

                    <input type="text"
                           th:field="*{apellidos}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Código</label>

                    <input type="text"
                           th:field="*{codigo}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Correo</label>

                    <input type="email"
                           th:field="*{correo}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Teléfono</label>

                    <input type="text"
                           th:field="*{telefono}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Especialidad</label>

                    <input type="text"
                           th:field="*{especialidad}"
                           class="form-control">

                </div>

                <button type="submit"
                        class="btn btn-primary">

                    Guardar

                </button>

                <a th:href="@{/docentes}"
                   class="btn btn-secondary">

                    Volver

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
