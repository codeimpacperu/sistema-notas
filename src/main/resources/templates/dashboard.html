<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" th:href="@{/img/favicon-96x96.png}">
    <link rel="apple-touch-icon" th:href="@{/img/apple-touch-icon.png}">

    <title>Sistema de Notas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">
            Sistema de Gestión Académica
        </h1>

        <p class="text-muted">
            Panel Principal
        </p>

    </div>

    <div class="row g-4">

        <!-- ALUMNOS -->
        <div class="col-md-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h2>👨‍🎓</h2>

                    <h4>Alumnos</h4>

                    <a th:href="@{/alumnos}"
                       class="btn btn-primary">

                        Ingresar

                    </a>

                </div>

            </div>

        </div>

        <!-- DOCENTES -->
        <div class="col-md-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h2>👨‍🏫</h2>

                    <h4>Docentes</h4>

                    <a th:href="@{/docentes}"
                       class="btn btn-success">

                        Ingresar

                    </a>

                </div>

            </div>

        </div>

        <!-- CURSOS -->
        <div class="col-md-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h2>📚</h2>

                    <h4>Cursos</h4>

                    <a th:href="@{/cursos}"
                       class="btn btn-warning">

                        Ingresar

                    </a>

                </div>

            </div>

        </div>

        <!-- MATRICULAS -->
        <div class="col-md-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h2>📝</h2>

                    <h4>Matrículas</h4>

                    <a th:href="@{/matriculas}"
                       class="btn btn-info">

                        Ingresar

                    </a>

                </div>

            </div>

        </div>

        <!-- NOTAS -->
        <div class="col-md-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h2>📊</h2>

                    <h4>Notas</h4>

                    <a th:href="@{/notas}"
                       class="btn btn-secondary">

                        Ingresar

                    </a>

                </div>

            </div>

        </div>

        <!-- REPORTES -->
        <div class="col-md-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h2>📄</h2>

                    <h4>Reportes</h4>

                    <a th:href="@{/reportes/alumnos}"
                       target="_blank"
                       class="btn btn-danger">

                        Ver Reporte

                    </a>

                </div>

            </div>

        </div>

    </div>

    <div class="text-center mt-5">

        <a th:href="@{/logout}"
           class="btn btn-dark">

            Cerrar Sesión

        </a>

    </div>

</div>

</body>

</html>
