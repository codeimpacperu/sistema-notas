<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" th:href="@{/img/favicon-96x96.png}">
    <link rel="apple-touch-icon" th:href="@{/img/apple-touch-icon.png}">
    <title>Lista de Notas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Lista de Notas</h3>
        </div>

        <div class="card-body">

            <!-- BOTONES Y BUSCADOR -->
            <div class="d-flex justify-content-between align-items-center mb-3">

                <div>

                    <a th:href="@{/notas/nuevo}"
                       class="btn btn-success">
                        Nueva Nota
                    </a>

                    <a th:href="@{/reportes/notas}"
                       target="_blank"
                       class="btn btn-danger">
                        Generar PDF
                    </a>
                    <!-- Volver al inicio -->
                <a th:href="@{/}" class="btn btn-secondary mb-0">← Volver</a>

                </div>

                <form th:action="@{/notas}"
                      method="get"
                      class="d-flex">

                    <input type="text"
                           name="buscar"
                           th:value="${buscar}"
                           class="form-control me-2"
                           placeholder="Buscar alumno...">

                    <button type="submit"
                            class="btn btn-primary">
                        Buscar
                    </button>

                </form>

            </div>

            <!-- TABLA -->
            <table class="table table-bordered table-hover">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Alumno</th>
                    <th>Curso</th>
                    <th>Docente</th>
                    <th>Tipo Evaluación</th>
                    <th>Nota</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="n : ${notas}">

                    <td th:text="${n.id}"></td>

                    <td th:text="${n.alumno.nombres + ' ' + n.alumno.apellidos}"></td>

                    <td th:text="${n.curso.nombre}"></td>

                    <td th:text="${n.docente.nombres + ' ' + n.docente.apellidos}"></td>

                    <td th:text="${n.tipoEvaluacion}"></td>

                    <td th:text="${n.nota}"></td>

                    <td th:text="${n.fechaRegistro}"></td>

                    <td>

                        <a th:href="@{/notas/editar/{id}(id=${n.id})}"
                           class="btn btn-warning btn-sm">
                            Editar
                        </a>

                        <a th:href="@{/notas/eliminar/{id}(id=${n.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Desea eliminar esta nota?')">
                            Eliminar
                        </a>

                    </td>

                </tr>

                <tr th:if="${#lists.isEmpty(notas)}">
                    <td colspan="8" class="text-center">
                        No se encontraron registros.
                    </td>
                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
