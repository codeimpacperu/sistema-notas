<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Curso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Registrar Curso</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/cursos/guardar}"
                  th:object="${curso}"
                  method="post">

                <input type="hidden"
                       th:field="*{id}">

                <div class="mb-3">

                    <label>Nombre</label>

                    <input type="text"
                           th:field="*{nombre}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Código</label>

                    <input type="text"
                           th:field="*{codigo}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Créditos</label>

                    <input type="number"
                           th:field="*{creditos}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Estado</label>

                    <select th:field="*{estado}"
                            class="form-select">

                        <option th:value="true">
                            Activo
                        </option>

                        <option th:value="false">
                            Inactivo
                        </option>

                    </select>

                </div>

                <button class="btn btn-success">

                    Guardar

                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
